# Local reverse-proxy routes for reverse_proxy.py
#
# Syntax (one route per line, '#' comments and blank lines ignored):
#   <listen_host>:<listen_port>/<path>[/$url] --> <target_host>:<target_port>[/<path>][/$url]
#
# A route matches its path as a prefix — everything under it is forwarded,
# with the matched prefix replaced by the target's path prefix. "$url" is
# optional and just documents where the remainder goes; omitting it (as in
# the second route below) has the same effect.

localhost:8091/exo --> localhost:52415
localhost:8091/mtp --> localhost:8000
